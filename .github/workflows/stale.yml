name: Close stale question issues and PRs

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Stale question issues
        uses: actions/stale@v9
        with:
          only-labels: 'question'
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue is labeled "question" and has had no activity for 30 days.
            It will be closed in 7 days if there's no further response. If it's
            still relevant, just leave a comment.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen or file a new issue
            if this is still relevant.

      - name: Stale PRs
        uses: actions/stale@v9
        with:
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 60
          days-before-pr-close: 14
          exempt-draft-pr: true
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has had no activity for 60 days. It will be closed in 14
            days if there's no further activity, rebase or comment to keep it
            open.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen or resubmit if this
            is still relevant.
